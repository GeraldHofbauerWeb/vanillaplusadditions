name: Code Quality

on:
  push:
    branches:
      - master
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - master

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download optional local mod jars
        run: |
          mkdir -p libs
          curl -fL --retry 3 --retry-delay 2 \
            -o libs/sable-neoforge-1.21.1-1.2.2.jar \
            https://mediafilez.forgecdn.net/files/8007/5/sable-neoforge-1.21.1-1.2.2.jar
          curl -fL --retry 3 --retry-delay 2 \
            -o libs/ToughAsNails-neoforge-1.21.1-10.1.0.13.jar \
            https://mediafilez.forgecdn.net/files/5833/252/ToughAsNails-neoforge-1.21.1-10.1.0.13.jar

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

  spotbugs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download optional local mod jars
        run: |
          mkdir -p libs
          curl -fL --retry 3 --retry-delay 2 \
            -o libs/sable-neoforge-1.21.1-1.2.2.jar \
            https://mediafilez.forgecdn.net/files/8007/5/sable-neoforge-1.21.1-1.2.2.jar
          curl -fL --retry 3 --retry-delay 2 \
            -o libs/ToughAsNails-neoforge-1.21.1-10.1.0.13.jar \
            https://mediafilez.forgecdn.net/files/5833/252/ToughAsNails-neoforge-1.21.1-10.1.0.13.jar

      - name: Run SpotBugs
        run: ./gradlew spotbugsMain spotbugsTest --no-daemon

      - name: Upload SpotBugs results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-results
          path: build/reports/spotbugs/
          if-no-files-found: ignore
