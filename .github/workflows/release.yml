name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download optional local mod jars
        run: |
          mkdir -p libs
          curl -fL --retry 3 --retry-delay 2 \
            -o libs/sable-neoforge-1.21.1-1.2.2.jar \
            https://mediafilez.forgecdn.net/files/8007/5/sable-neoforge-1.21.1-1.2.2.jar
          curl -fL --retry 3 --retry-delay 2 \
            -o libs/ToughAsNails-neoforge-1.21.1-10.1.0.13.jar \
            https://mediafilez.forgecdn.net/files/5833/252/ToughAsNails-neoforge-1.21.1-10.1.0.13.jar

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Build standalone module jars
        run: ./gradlew moduleJars --no-daemon

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ env.VERSION }}"
          # Extract the block between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          # Store multiline output via environment file
          {
            echo "RELEASE_NOTES<<EOF"
            echo "## VanillaPlusAdditions v${VERSION}"
            echo ""
            echo "${NOTES}"
            echo ""
            echo "### 🚀 Installation"
            echo "1. Download the jar file"
            echo "2. Place it in your \`mods\` folder"
            echo "3. Make sure you have NeoForge for Minecraft 1.21.1 installed"
            echo ""
            echo "### 🔧 Configuration"
            echo "See [Configuration Guide](https://github.com/Gerry3010/vanillaplusadditions/blob/master/docs/MODULE_CONFIG_GUIDE.md)"
            echo ""
            echo "### 🐛 Debug Logging"
            echo "See [Debug Logging Guide](https://github.com/Gerry3010/vanillaplusadditions/blob/master/docs/DEBUG_LOGGING_CONFIG.md)"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: VanillaPlusAdditions v${{ env.VERSION }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            build/libs/*.jar
            build/libs/modules/*.jar
          draft: false
          prerelease: false

      - name: Backfill release notes for all existing tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # For every vX.Y.Z tag that already has a release, update its body from CHANGELOG.md
          git tag -l 'v*' | sort -V | while read TAG; do
            VER="${TAG#v}"
            NOTES=$(awk "/^## \[${VER}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
            if [ -n "$NOTES" ]; then
              {
                echo "## VanillaPlusAdditions v${VER}"
                echo
                echo "${NOTES}"
                echo
                echo "### 🚀 Installation"
                echo "1. Download the jar file"
                echo "2. Place it in your \`mods\` folder"
                echo "3. Make sure you have NeoForge for Minecraft 1.21.1 installed"
                echo
                echo "### 🔧 Configuration"
                echo "See [Configuration Guide](https://github.com/Gerry3010/vanillaplusadditions/blob/master/docs/MODULE_CONFIG_GUIDE.md)"
                echo
                echo "### 🐛 Debug Logging"
                echo "See [Debug Logging Guide](https://github.com/Gerry3010/vanillaplusadditions/blob/master/docs/DEBUG_LOGGING_CONFIG.md)"
              } > /tmp/release_notes.txt
              # --tag is optional here; gh release edit identifies by tag name
              gh release edit "$TAG" --notes-file /tmp/release_notes.txt 2>/dev/null || true
            fi
          done

      - name: Upload to CurseForge
        if: false  # Disabled until CurseForge API key is configured
        uses: gradle/gradle-build-action@v2
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        with:
          arguments: curseforge