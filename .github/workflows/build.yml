name: Build

on:
  push:
    branches:
      - master
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download optional local mod jars
        run: |
          mkdir -p libs
          curl -fL --retry 3 --retry-delay 2 \
            -o libs/sable-neoforge-1.21.1-1.2.2.jar \
            https://mediafilez.forgecdn.net/files/8007/5/sable-neoforge-1.21.1-1.2.2.jar
          curl -fL --retry 3 --retry-delay 2 \
            -o libs/ToughAsNails-neoforge-1.21.1-10.1.0.13.jar \
            https://mediafilez.forgecdn.net/files/5833/252/ToughAsNails-neoforge-1.21.1-10.1.0.13.jar

      - name: Build with Gradle
        # tee to a shared log for pipepush; GitHub's shell has pipefail on by
        # default, so a Gradle failure still fails the step.
        run: ./gradlew build --no-daemon 2>&1 | tee -a "$RUNNER_TEMP/pipepush.log"

      - name: Build standalone module jars
        run: ./gradlew moduleJars --no-daemon 2>&1 | tee -a "$RUNNER_TEMP/pipepush.log"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VanillaPlusAdditions-artifacts
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Upload standalone module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VanillaPlusAdditions-modules
          path: build/libs/modules/*.jar
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/test/
          if-no-files-found: ignore

      - name: Notify pipepush
        if: always()                 # notify on success AND failure
        run: |
          LOGS=$(tail -c 16000 "$RUNNER_TEMP/pipepush.log" 2>/dev/null || true)
          jq -nc --arg token "$PIPEPUSH_TOKEN" --arg status "${{ job.status }}" \
            --arg pipeline "$GITHUB_WORKFLOW" --arg branch "$GITHUB_REF_NAME" \
            --arg commit "$GITHUB_SHA" --arg runId "$GITHUB_RUN_NUMBER" --arg logs "$LOGS" \
            '{token:$token,status:$status,pipeline:$pipeline,branch:$branch,commit:$commit,runId:$runId,logs:$logs}' \
            | curl -sf -X POST "$PIPEPUSH_SERVER/api/webhook" -H "Content-Type: application/json" -d @-
        env:
          PIPEPUSH_TOKEN: ${{ secrets.PIPEPUSH_TOKEN }}
          PIPEPUSH_SERVER: ${{ vars.PIPEPUSH_SERVER }}
